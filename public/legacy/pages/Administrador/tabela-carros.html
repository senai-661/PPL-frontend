<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tabela Carros — OpenLine Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../CSS/style.css">
    <link rel="stylesheet" href="../../CSS/admin.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/buttons/2.4.1/css/buttons.dataTables.min.css">
    <style>
        .admin-header { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); color: white; }
        .dt-actions .btn { margin-right: .4rem; }
        body { background: #f6f7fb; }
        .card { box-shadow: var(--shadow-sm); }
    </style>
</head>
<body>
    <nav class="navbar admin-header">
        <div class="container-fluid">
            <a class="navbar-brand text-white" href="#" style="font-weight:700;">OpenLine Admin</a>
            <div class="d-flex">
            </div>
        </div>
    </nav>

    <div class="admin-layout">
        <aside class="admin-sidebar">
            <div class="brand px-3">
                <i class="fas fa-car fa-lg"></i>
                <h4>OpenLine Admin</h4>
            </div>
            <nav>
                <a class="nav-link active" href="tabela-carros.html"><i class="fas fa-car-side"></i> Carros</a>
                <a class="nav-link" href="tabela-motoristas.html"><i class="fas fa-id-card"></i> Motoristas</a>
                <a class="nav-link" href="tabela-passageiros.html"><i class="fas fa-users"></i> Passageiros</a>
            </nav>
        </aside>

        <main class="admin-main">
            <div class="container my-4 admin-card">
                <div class="card">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h5 class="mb-0">Tabela de Veículos</h5>
                            <a class="btn btn-primary" href="#">+ Adicionar Veículo</a>
                        </div>

                        <table id="tableCars" class="display nowrap" style="width:100%">
                            <thead>
                                <tr>
                                    <th>id_veiculo</th>
                                    <th>id_motorista</th>
                                    <th>placa</th>
                                    <th>tipo/th>
                                    <th>modelo</th>
                                    <th>Ação</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- Dados serão carregados pelo backend - nenhum registro de exemplo incluído -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/buttons/2.4.1/js/dataTables.buttons.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/pdfmake.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/vfs_fonts.js"></script>
    <script src="https://cdn.datatables.net/buttons/2.4.1/js/buttons.html5.min.js"></script>
    <script src="https://cdn.datatables.net/buttons/2.4.1/js/buttons.print.min.js"></script>
    <script>
        $(document).ready(function() {
            $('#tableCars').DataTable({
                dom: 'Bfrtip',
                buttons: ['copy', 'excel', 'csv', 'pdf', 'print'],
                responsive: true,
                 ajax: {
                    url: 'http://localhost:1285/api/veiculos',
                    dataSrc: ''
                },
                columns: [
                    { data: 'idVeiculo' },
                    { data: 'idMotorista' },
                    { data: 'placa' },
                    { data: 'tipoVeiculo' },
                    { data: 'modeloVeiculo' },
                    { data: null }
                ],
                columnDefs: [
                    { targets: -1, orderable: false, searchable: false, render: function() {
                        return '<button class="btn btn-sm btn-success">Edit</button> <button class="btn btn-sm btn-danger">Delete</button>';
                    }}
                ]
                // Para popular por AJAX: ajax: { url: '/api/veiculos', dataSrc: '' }
            });
        });
    </script>
</body>
</html>
