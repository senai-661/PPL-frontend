<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homepage Passageiro | Openline</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../../CSS/style.css">
    <link rel="stylesheet" href="../../CSS/google-maps.css">
    <link rel="stylesheet" href="../../CSS/mapa-motorista.css">
    <link rel="stylesheet" href="../../CSS/homepage-passageiro.css">
</head>
<body class="mapa-body">
    <!-- Navigation Bar -->
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark py-3 navbar-mapa">
            <div class="container-fluid">
                <a class="navbar-brand" href="../../index.html">
                    <i class="fas fa-car me-2"></i>Openline
                </a>
                <div class="ms-auto d-flex gap-3 align-items-center">
                    <div class="notification-badge">
                        <i class="fas fa-bell text-white" style="font-size: 1.2rem;"></i>
                        <span class="badge">2</span>
                    </div>
                    <div class="dropdown">
                        <a class="text-white dropdown-toggle" href="#" id="userMenuDropdown" role="button" data-bs-toggle="dropdown" style="font-weight: 600; text-decoration: none; display: flex; align-items: center;">
                            <i class="fas fa-circle-user me-2"></i>Perfil
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end" style="background-color: #5a34a1; border: none;" aria-labelledby="userMenuDropdown">
                            <li><a class="dropdown-item text-white" href="./perfil-passageiro.html" style="background-color: #5a34a1;"><i class="fas fa-user me-2"></i>Meu Perfil</a></li>
                            <li><hr class="dropdown-divider" style="border-color: rgba(255, 255, 255, 0.2);"></li>
                            <li><a class="dropdown-item text-white" href="../login.html" style="background-color: #5a34a1;"><i class="fas fa-sign-out-alt me-2"></i>Sair</a></li>
                        </ul>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <!-- Main Container -->
    <main class="mapa-main">
        <!-- Map Container -->
        <div id="map" class="mapa-container"></div>

        <!-- Sidebar Direita - Solicitar Corrida -->
        <div class="sidebar sidebar-right">
            <div class="sidebar-header">
                <h5><i class="fas fa-map-pin me-2"></i>Solicitar Corrida</h5>
            </div>
            <form id="rideRequestForm" class="p-3">
                <div class="mb-3">
                    <label for="inputOrigem" class="form-label"><i class="fas fa-location-dot me-2"></i>Origem</label>
                    <input type="text" class="form-control" id="inputOrigem" placeholder="Digite o endereço de origem ou use sua localização">
                    <button type="button" class="btn btn-link p-0 mt-1" onclick="useCurrentLocation()"><i class="fas fa-crosshairs me-1"></i>Usar minha localização</button>
                </div>
                <div class="mb-3">
                    <label for="inputDestino" class="form-label"><i class="fas fa-map-pin me-2"></i>Destino</label>
                    <input type="text" class="form-control" id="inputDestino" placeholder="Digite o endereço de destino">
                </div>
                <button type="submit" class="btn btn-primary w-100">
                    <i class="fas fa-location-arrow me-1"></i>Solicitar Corrida
                </button>
            </form>
            <div id="rideInfo" class="mt-4"></div>
        </div>

        <!-- Sidebar Esquerda - Histórico e Status -->
        <div class="sidebar sidebar-left">
            <div class="status-card">
                <h6><i class="fas fa-history me-2"></i>Histórico de Corridas</h6>
                <ul class="list-group" id="rideHistoryList"></ul>
            </div>
            <div class="stats-compact">
                <div class="stat-box">
                    <div class="stat-value">12</div>
                    <div class="stat-label">Corridas</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value">4.7</div>
                    <div class="stat-label">⭐ Nota</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value">R$ 320</div>
                    <div class="stat-label">Gasto</div>
                </div>
            </div>
        </div>

        <!-- Top Bar - Info -->
        <div class="top-bar">
            <div class="top-bar-content">
                <div class="location-info">
                    <i class="fas fa-map-marker-alt"></i>
                    <span id="currentLocationText">São Paulo, SP</span>
                </div>
                <div class="time-info">
                    <i class="fas fa-clock"></i>
                    <span id="currentTime">14:30</span>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCcjp3bW2qrOCPXtMnnftnUECl1B8GAeuY&libraries=places&callback=initPassengerMap" async defer></script>
    <script src="../../js/homepage-passageiro.js"></script>
</body>
</html>
